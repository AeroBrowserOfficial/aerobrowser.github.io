<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачать AeroBrowser</title>
    <style>
        :root {
            --primary: #007aff;
            --primary-hover: #0056b3;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -0.05em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .download-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .system-detected {
            font-size: 0.9rem;
            color: #10b981; /* Зеленый цвет */
            margin-bottom: 20px;
            font-weight: 500;
            display: none; /* Покажется через JS */
        }

        .buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Эффект при наведении */
        .btn:hover {
            background-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        /* Стиль для кнопки, которая подходит под ОС пользователя */
        .btn.recommended {
            background-color: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }

        .btn.recommended:hover {
            background-color: var(--primary-hover);
        }

        .version-info {
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AeroBrowser</h1>
        <p class="subtitle">Легкий, быстрый и современный браузер нового поколения</p>

        <div class="download-container">
            <div id="detected-os-text" class="system-detected"></div>

            <div class="buttons-grid">
                <a href="dist/AeroBrowser-Setup-1.0.0.exe" id="btn-win" class="btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M0 3.449L9.75 2.1v9.451H0V3.449zM0 12.55h9.75v9.45L0 20.551v-8zM10.8 1.95L24 0v11.55H10.8V1.95zM24 12.55v11.45l-13.2-1.95v-9.5H24z"/>
                    </svg>
                    Скачать для Windows (.exe)
                </a>

                <a href="dist/AeroBrowser-1.0.0.dmg" id="btn-mac" class="btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.12.09 2.27-.58 2.95-1.39z"/>
                    </svg>
                    Скачать для macOS (.dmg)
                </a>

                <a href="dist/AeroBrowser-1.0.0.AppImage" id="btn-linux" class="btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2c-5.52 0-10 4.48-10 10 0 3.75 2.06 7.02 5.13 8.76-.08-.34-.13-.7-.13-1.07v-2.16c-1.39.42-2.77-.28-3.12-1.68-.31-1.22-1.28-1.59-1.28-1.59-.92-.63.07-.62.07-.62 1.02.07 1.56 1.05 1.56 1.05.91 1.55 2.38 1.1 2.96.84.09-.66.36-1.1.65-1.35-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02.8-.22 1.65-.33 2.5-.33.85 0 1.7.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85v2.75c0 .38-.05.74-.14 1.09 3.08-1.74 5.14-5.01 5.14-8.76 0-5.52-4.48-10-10-10z"/>
                    </svg>
                    Скачать для Linux (.AppImage)
                </a>
            </div>

            <div class="version-info">Версия: 1.0.0 | Лицензия: MIT</div>
        </div>
    </div>

    <script>
        // Скрипт автоматического определения операционной системы пользователя
        window.addEventListener('DOMContentLoaded', () => {
            const platform = window.navigator.platform.toLowerCase();
            const userAgent = window.navigator.userAgent.toLowerCase();
            
            let detectedOS = "unknown";
            let osLabel = "";
            let recommendedBtnId = "";

            if (platform.includes('win') || userAgent.includes('windows')) {
                detectedOS = "windows";
                osLabel = "Обнаружена ОС: Windows";
                recommendedBtnId = "btn-win";
            } else if (platform.includes('mac') || userAgent.includes('macintosh') || userAgent.includes('ipad') || userAgent.includes('iphone')) {
                detectedOS = "mac";
                osLabel = "Обнаружена ОС: macOS";
                recommendedBtnId = "btn-mac";
            } else if (platform.includes('linux') || userAgent.includes('linux')) {
                detectedOS = "linux";
                osLabel = "Обнаружена ОС: Linux";
                recommendedBtnId = "btn-linux";
            }

            // Если система распознана, подсвечиваем нужную кнопку
            if (detectedOS !== "unknown" && recommendedBtnId) {
                const targetBtn = document.getElementById(recommendedBtnId);
                const infoText = document.getElementById('detected-os-text');
                
                if (targetBtn) {
                    targetBtn.classList.add('recommended'); // Делаем синей
                }
                if (infoText) {
                    infoText.innerText = osLabel;
                    infoText.style.display = 'block'; // Показываем зеленую надпись
                }
            }
        });
    </script>
</body>
</html>
